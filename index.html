<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Compressor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .upload-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: #764ba2;
            background: #f0f2ff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
        }

        .upload-subtext {
            font-size: 14px;
            color: #999;
        }

        #fileInput {
            display: none;
        }

        .controls {
            display: none;
            margin-top: 30px;
        }

        .controls.active {
            display: block;
        }

        .file-badge {
            display: inline-block;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .help-text {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
        }

        .quality-value {
            font-weight: 600;
            color: #667eea;
            min-width: 45px;
            text-align: right;
        }

        .dimension-inputs {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: center;
        }

        .lock-aspect {
            cursor: pointer;
            font-size: 24px;
            user-select: none;
            transition: transform 0.2s;
        }

        .lock-aspect:hover {
            transform: scale(1.1);
        }

        .format-select {
            display: none;
        }

        .format-select.active {
            display: block;
        }

        .compress-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .compress-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .compress-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner.active {
            display: block;
        }

        .spinner-icon {
            font-size: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .results {
            display: none;
            margin-top: 30px;
            text-align: center;
        }

        .results.active {
            display: block;
        }

        .success-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .stats {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: #666;
        }

        .stat-value {
            font-weight: 600;
            color: #333;
        }

        .savings {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #e0e0e0;
        }

        .savings.positive .stat-value {
            color: #10b981;
        }

        .savings.negative .stat-value {
            color: #ef4444;
        }

        .download-btn {
            width: 100%;
            padding: 16px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .reset-btn:hover {
            background: #667eea;
            color: white;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 16px 24px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .notification.active {
            display: flex;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .error-details {
            background: #fee;
            border: 2px solid #fcc;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 12px;
            color: #c00;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 File Compressor</h1>

        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Drop your file here or click to browse</div>
            <div class="upload-subtext">Supports images (PNG, JPEG, WebP) and PDFs</div>
        </div>

        <input type="file" id="fileInput" accept="image/*,.pdf">

        <div class="controls" id="controls">
            <span class="file-badge" id="fileTypeBadge">📄 File</span>

            <div class="control-group">
                <label for="filename">Filename:</label>
                <input type="text" id="filename" placeholder="compressed-file">
            </div>

            <div class="control-group format-select" id="formatSelect">
                <label for="format">Output Format:</label>
                <select id="format">
                    <option value="JPEG">JPEG</option>
                    <option value="WEBP">WebP</option>
                    <option value="PNG">PNG</option>
                </select>
            </div>

            <div class="control-group">
                <label id="qualityLabel">Quality:</label>
                <div class="slider-container">
                    <input type="range" id="quality" min="10" max="100" value="85">
                    <span class="quality-value" id="qualityValue">85%</span>
                </div>
                <div class="help-text" id="qualityHelp">Lower quality = smaller file size</div>
            </div>

            <div class="control-group">
                <label>Dimensions:</label>
                <div class="dimension-inputs">
                    <input type="number" id="width" placeholder="Width">
                    <span class="lock-aspect" id="lockAspect">🔒</span>
                    <input type="number" id="height" placeholder="Height">
                </div>
                <div class="help-text">Leave empty to keep original size</div>
            </div>

            <button class="compress-btn" id="compressBtn">Compress File</button>
        </div>

        <div class="spinner" id="spinner">
            <div class="spinner-icon">⚙️</div>
            <p>Compressing...</p>
        </div>

        <div class="results" id="results">
            <div class="success-icon">✅</div>
            <h2>Compression Complete!</h2>

            <div class="stats">
                <div class="stat-row">
                    <span class="stat-label">Original Size:</span>
                    <span class="stat-value" id="originalSize">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Compressed Size:</span>
                    <span class="stat-value" id="compressedSize">-</span>
                </div>
                <div class="stat-row savings" id="savings">
                    <span class="stat-label"></span>
                    <span class="stat-value" id="savingsText">-</span>
                </div>
            </div>

            <button class="download-btn" id="downloadBtn">Download Compressed File</button>
            <button class="reset-btn" id="resetBtn">Compress Another File</button>
        </div>

        <div id="errorDisplay"></div>
    </div>

    <div class="notification" id="notification">
        <span id="notificationText"></span>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const fileTypeBadge = document.getElementById('fileTypeBadge');
        const formatSelect = document.getElementById('formatSelect');
        const filenameInput = document.getElementById('filename');
        const formatSelector = document.getElementById('format');
        const qualitySlider = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        const qualityLabel = document.getElementById('qualityLabel');
        const qualityHelp = document.getElementById('qualityHelp');
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');
        const lockAspect = document.getElementById('lockAspect');
        const compressBtn = document.getElementById('compressBtn');
        const spinner = document.getElementById('spinner');
        const results = document.getElementById('results');
        const notification = document.getElementById('notification');
        const errorDisplay = document.getElementById('errorDisplay');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');

        let originalFile = null;
        let compressedBlob = null;
        let originalAspectRatio = 1;
        let aspectRatioLocked = true;
        let fileType = null;

        uploadZone.addEventListener('click', () => fileInput.click());
        
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        async function handleFile(file) {
            originalFile = file;
            fileType = file.type.startsWith('image/') ? 'image' : 'pdf';

            const nameWithoutExt = file.name.replace(/\.[^/.]+$/, '');
            filenameInput.value = `compressed-${nameWithoutExt}`;

            if (fileType === 'image') {
                fileTypeBadge.textContent = '🖼️ Image';
                formatSelect.classList.add('active');
                qualityLabel.textContent = 'Image Quality:';
                qualityHelp.textContent = 'Lower quality = smaller file size';
                
                const img = new Image();
                img.onload = () => {
                    widthInput.value = img.width;
                    heightInput.value = img.height;
                    originalAspectRatio = img.width / img.height;
                };
                img.src = URL.createObjectURL(file);
            } else {
                fileTypeBadge.textContent = '📄 PDF';
                formatSelect.classList.remove('active');
                qualityLabel.textContent = 'PDF Quality:';
                qualityHelp.textContent = 'Lower quality = smaller file. PDF pages are re-rendered and compressed.';
                
                const formData = new FormData();
                formData.append('file', file);
                
                try {
                    const response = await fetch('/get-pdf-dimensions', {
                        method: 'POST',
                        body: formData
                    });
                    const dimensions = await response.json();
                    widthInput.value = dimensions.width;
                    heightInput.value = dimensions.height;
                    originalAspectRatio = dimensions.width / dimensions.height;
                } catch (error) {
                    console.error('Dimensions error:', error);
                    showError('Failed to get PDF dimensions', error);
                }
            }

            controls.classList.add('active');
            results.classList.remove('active');
            errorDisplay.innerHTML = '';
        }

        qualitySlider.addEventListener('input', (e) => {
            qualityValue.textContent = e.target.value + '%';
        });

        widthInput.addEventListener('input', (e) => {
            if (aspectRatioLocked && e.target.value) {
                heightInput.value = Math.round(e.target.value / originalAspectRatio);
            }
        });

        heightInput.addEventListener('input', (e) => {
            if (aspectRatioLocked && e.target.value) {
                widthInput.value = Math.round(e.target.value * originalAspectRatio);
            }
        });

        lockAspect.addEventListener('click', () => {
            aspectRatioLocked = !aspectRatioLocked;
            lockAspect.textContent = aspectRatioLocked ? '🔒' : '🔓';
        });

        compressBtn.addEventListener('click', async () => {
            if (!originalFile) return;

            spinner.classList.add('active');
            compressBtn.disabled = true;
            controls.style.opacity = '0.5';
            errorDisplay.innerHTML = '';

            try {
                const formData = new FormData();
                formData.append('file', originalFile);
                formData.append('quality', qualitySlider.value);
                formData.append('width', widthInput.value);
                formData.append('height', heightInput.value);

                let endpoint = fileType === 'image' ? '/compress-image' : '/compress-pdf';
                
                if (fileType === 'image') {
                    formData.append('format', formatSelector.value);
                }

                console.log('Sending request to:', endpoint);
                console.log('Quality:', qualitySlider.value);
                console.log('Dimensions:', widthInput.value, 'x', heightInput.value);

                const response = await fetch(endpoint, {
                    method: 'POST',
                    body: formData
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Server error response:', errorText);
                    throw new Error(`Server returned ${response.status}: ${errorText}`);
                }

                compressedBlob = await response.blob();
                console.log('Received blob:', compressedBlob.size, 'bytes');

                document.getElementById('originalSize').textContent = formatFileSize(originalFile.size);
                document.getElementById('compressedSize').textContent = formatFileSize(compressedBlob.size);

                const savings = ((originalFile.size - compressedBlob.size) / originalFile.size * 100);
                const savingsElement = document.getElementById('savings');
                const savingsText = document.getElementById('savingsText');
                
                if (savings > 0) {
                    savingsElement.classList.remove('negative');
                    savingsElement.classList.add('positive');
                    savingsText.textContent = `✅ File reduced by ${savings.toFixed(1)}%`;
                } else {
                    savingsElement.classList.remove('positive');
                    savingsElement.classList.add('negative');
                    savingsText.textContent = `⚠️ File increased by ${Math.abs(savings).toFixed(1)}%`;
                }

                controls.classList.remove('active');
                results.classList.add('active');
                showNotification('✅ Compression complete!');

            } catch (error) {
                console.error('Compression error:', error);
                showError('Compression failed', error);
                showNotification('❌ Compression failed. Check error details below.');
            } finally {
                spinner.classList.remove('active');
                compressBtn.disabled = false;
                controls.style.opacity = '1';
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (!compressedBlob) return;

            const extension = fileType === 'image' ? formatSelector.value.toLowerCase() : 'pdf';
            const filename = `${filenameInput.value}.${extension}`;

            const url = URL.createObjectURL(compressedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showNotification('📥 Download started!');
        });

        resetBtn.addEventListener('click', () => {
            originalFile = null;
            compressedBlob = null;
            fileInput.value = '';
            controls.classList.remove('active');
            results.classList.remove('active');
            errorDisplay.innerHTML = '';
        });

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

        function showNotification(message) {
            const notificationText = document.getElementById('notificationText');
            notificationText.textContent = message;
            notification.classList.add('active');
            setTimeout(() => {
                notification.classList.remove('active');
            }, 3000);
        }

        function showError(message, error) {
            errorDisplay.innerHTML = `
                <div class="error-details">
                    <strong>❌ ${message}</strong><br><br>
                    <strong>Error:</strong> ${error.message}<br>
                    <strong>Stack:</strong><br>
                    <pre>${error.stack || 'No stack trace available'}</pre>
                </div>
            `;
        }
    </script>
</body>
</html>
