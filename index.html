<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshot & PDF Compressor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .upload-zone {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            border: 3px dashed #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .upload-zone:hover {
            border-color: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .upload-zone.dragover {
            background: #f0f4ff;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 10px;
        }

        .upload-subtext {
            color: #999;
            font-size: 0.9em;
        }

        .controls {
            display: none;
        }

        .controls.active {
            display: block;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .file-type-badge {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .control-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .slider-container {
            margin-bottom: 25px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .slider-value {
            color: #667eea;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            border: none;
        }

        .dimension-controls {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 15px;
            align-items: end;
        }

        .lock-button {
            padding: 12px 20px;
            background: #f0f0f0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.5em;
            transition: all 0.3s;
        }

        .lock-button.locked {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .success-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .success-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .success-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .file-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .savings {
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1.3em;
            font-weight: bold;
        }

        .savings.positive {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .savings.negative {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffc107;
        }

        .reset-button {
            background: #6c757d;
            margin-top: 10px;
        }

        .spinner {
            display: none;
            margin: 20px auto;
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .spinner.active {
            display: block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .notification.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .help-text {
            color: #999;
            font-size: 0.85em;
            margin-top: 5px;
        }

        .format-select {
            display: none;
        }

        .format-select.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Screenshot & PDF Compressor</h1>

        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Drop your file here</div>
            <div class="upload-subtext">Images (PNG, JPEG, WebP) or PDFs</div>
            <input type="file" id="fileInput" accept="image/*,application/pdf" style="display: none;">
        </div>

        <div class="controls" id="controls">
            <div class="file-type-badge" id="fileTypeBadge">📄 File</div>
            
            <div class="control-group">
                <label for="filename">Filename:</label>
                <input type="text" id="filename" placeholder="compressed-file">
            </div>

            <div class="control-group format-select" id="formatSelect">
                <label for="format">Format:</label>
                <select id="format">
                    <option value="JPEG">JPEG</option>
                    <option value="WEBP">WebP</option>
                    <option value="PNG">PNG</option>
                </select>
            </div>

            <div class="slider-container">
                <div class="slider-label">
                    <label id="qualityLabel">Quality:</label>
                    <span class="slider-value" id="qualityValue">85%</span>
                </div>
                <input type="range" id="quality" min="10" max="100" value="85">
                <div class="help-text" id="qualityHelp">Lower quality = smaller file size</div>
            </div>

            <div class="control-group">
                <label>Dimensions:</label>
                <div class="dimension-controls">
                    <div>
                        <input type="number" id="width" placeholder="Width">
                    </div>
                    <button class="lock-button locked" id="lockAspect">🔒</button>
                    <div>
                        <input type="number" id="height" placeholder="Height">
                    </div>
                </div>
                <div class="help-text">Lock aspect ratio to maintain proportions</div>
            </div>

            <button id="compressBtn">Compress File</button>
        </div>

        <div class="spinner" id="spinner"></div>

        <div class="results" id="results">
            <div class="success-card">
                <div class="success-icon">✅</div>
                <div class="success-title">File Compressed Successfully!</div>
                
                <div class="file-stats">
                    <div class="stat">
                        <div class="stat-label">Original Size</div>
                        <div class="stat-value" id="originalSize">-</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Compressed Size</div>
                        <div class="stat-value" id="compressedSize">-</div>
                    </div>
                </div>

                <div class="savings" id="savings">
                    <span id="savingsText"></span>
                </div>

                <button id="downloadBtn" class="download-button">📥 Download Compressed File</button>
                <button id="resetBtn" class="reset-button">🔄 Compress Another File</button>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const fileTypeBadge = document.getElementById('fileTypeBadge');
        const formatSelect = document.getElementById('formatSelect');
        const filenameInput = document.getElementById('filename');
        const formatSelector = document.getElementById('format');
        const qualitySlider = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        const qualityLabel = document.getElementById('qualityLabel');
        const qualityHelp = document.getElementById('qualityHelp');
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');
        const lockAspect = document.getElementById('lockAspect');
        const compressBtn = document.getElementById('compressBtn');
        const spinner = document.getElementById('spinner');
        const results = document.getElementById('results');
        const notification = document.getElementById('notification');

        let originalFile = null;
        let compressedBlob = null;
        let originalAspectRatio = 1;
        let aspectRatioLocked = true;
        let fileType = null;

        uploadZone.addEventListener('click', () => fileInput.click());
        
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        async function handleFile(file) {
            originalFile = file;
            fileType = file.type.startsWith('image/') ? 'image' : 'pdf';

            const nameWithoutExt = file.name.replace(/\.[^/.]+$/, '');
            filenameInput.value = `compressed-${nameWithoutExt}`;

            if (fileType === 'image') {
                fileTypeBadge.textContent = '🖼️ Image';
                formatSelect.classList.add('active');
                qualityLabel.textContent = 'Image Quality:';
                qualityHelp.textContent = 'Lower quality = smaller file size';
                
                // Load image dimensions
                const img = new Image();
                img.onload = () => {
                    widthInput.value = img.width;
                    heightInput.value = img.height;
                    originalAspectRatio = img.width / img.height;
                };
                img.src = URL.createObjectURL(file);
            } else {
                fileTypeBadge.textContent = '📄 PDF';
                formatSelect.classList.remove('active');
                qualityLabel.textContent = 'PDF Quality:';
                qualityHelp.textContent = 'Lower quality = smaller file. PDF pages are re-rendered and compressed.';
                
                // Get PDF dimensions
                const formData = new FormData();
                formData.append('file', file);
                
                try {
                    const response = await fetch('/get-pdf-dimensions', {
                        method: 'POST',
                        body: formData
                    });
                    const dimensions = await response.json();
                    widthInput.value = dimensions.width;
                    heightInput.value = dimensions.height;
                    originalAspectRatio = dimensions.width / dimensions.height;
                } catch (error) {
                    console.error('Dimensions error:', error);
                }
            }

            controls.classList.add('active');
            results.classList.remove('active');
        }

        qualitySlider.addEventListener('input', (e) => {
            qualityValue.textContent = e.target.value + '%';
        });

        lockAspect.addEventListener('click', () => {
            aspectRatioLocked = !aspectRatioLocked;
            lockAspect.textContent = aspectRatioLocked ? '🔒' : '🔓';
            lockAspect.classList.toggle('locked');
        });

        widthInput.addEventListener('input', () => {
            if (aspectRatioLocked && widthInput.value) {
                heightInput.value = Math.round(widthInput.value / originalAspectRatio);
            }
        });

        heightInput.addEventListener('input', () => {
            if (aspectRatioLocked && heightInput.value) {
                widthInput.value = Math.round(heightInput.value * originalAspectRatio);
            }
        });

        compressBtn.addEventListener('click', async () => {
            if (!originalFile) return;

            spinner.classList.add('active');
            compressBtn.disabled = true;
            controls.style.opacity = '0.5';

            try {
                const formData = new FormData();
                formData.append('file', originalFile);
                formData.append('quality', qualitySlider.value);
                formData.append('width', widthInput.value);
                formData.append('height', heightInput.value);

                let endpoint = fileType === 'image' ? '/compress-image' : '/compress-pdf';
                
                if (fileType === 'image') {
                    formData.append('format', formatSelector.value);
                }

                const response = await fetch(endpoint, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Compression failed');
                }

                compressedBlob = await response.blob();

                // Show results
                document.getElementById('originalSize').textContent = formatFileSize(originalFile.size);
                document.getElementById('compressedSize').textContent = formatFileSize(compressedBlob.size);

                const savings = ((originalFile.size - compressedBlob.size) / originalFile.size * 100);
                const savingsElement = document.getElementById('savings');
                const savingsText = document.getElementById('savingsText');
                
                if (savings > 0) {
                    savingsElement.classList.remove('negative');
                    savingsElement.classList.add('positive');
                    savingsText.textContent = `✅ File reduced by ${savings.toFixed(1)}%`;
                } else {
                    savingsElement.classList.remove('positive');
                    savingsElement.classList.add('negative');
                    savingsText.textContent = `⚠️ File increased by ${Math.abs(savings).toFixed(1)}%`;
                }

                controls.classList.remove('active');
                results.classList.add('active');
                showNotification('✅ Compression complete!');

            } catch (error) {
                console.error('Compression error:', error);
                showNotification('❌ Compression failed. Please try again.');
            } finally {
                spinner.classList.remove('active');
                compressBtn.disabled = false;
                controls.style.opacity = '1';
            }
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (!compressedBlob) return;

            const filename = filenameInput.value || 'compressed-file';
            let extension = fileType === 'image' ? `.${formatSelector.value.toLowerCase()}` : '.pdf';
            
            const url = URL.createObjectURL(compressedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename + extension;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showNotification('📥 Download started!');
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            results.classList.remove('active');
            controls.classList.remove('active');
            originalFile = null;
            compressedBlob = null;
            fileInput.value = '';
            showNotification('🔄 Ready for another file!');
        });

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function showNotification(message) {
            notification.textContent = message;
            notification.classList.add('active');
            setTimeout(() => {
                notification.classList.remove('active');
            }, 3000);
        }
    </script>
</body>
</html>
