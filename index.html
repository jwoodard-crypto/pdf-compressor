<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Compressor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(-45deg, #FF6B6B, #4ECDC4, #45B7D1, #FFA07A, #98D8C8, #F7DC6F);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            padding: 35px;
            max-width: 550px;
            width: 100%;
            position: relative;
            z-index: 1;
            max-height: 90vh;
            overflow-y: auto;
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #45B7D1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            font-size: 32px;
            font-weight: 800;
            animation: rainbow 5s linear infinite;
        }

        .upload-zone {
            border: 4px dashed #FF6B6B;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            background: linear-gradient(135deg, #FFF5F5, #F0FFFF);
            position: relative;
            overflow: hidden;
        }

        .upload-zone::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,107,107,0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.6s;
        }

        .upload-zone:hover::before {
            left: 100%;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: #4ECDC4;
            background: linear-gradient(135deg, #F0FFFF, #FFF5F5);
            transform: scale(1.03) rotate(1deg);
            box-shadow: 0 10px 40px rgba(78, 205, 196, 0.3);
        }

        .upload-icon {
            font-size: 50px;
            margin-bottom: 15px;
            animation: pulse 2s ease-in-out infinite;
        }

        .upload-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .upload-subtext {
            font-size: 13px;
            color: #666;
        }

        #fileInput {
            display: none;
        }

        .file-list {
            display: none;
            margin-top: 20px;
        }

        .file-list.active {
            display: block;
        }

        .file-item {
            background: linear-gradient(135deg, #FFF5F5, #F0FFFF);
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .file-item:hover {
            border-color: #4ECDC4;
            transform: translateX(5px);
        }

        .file-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            flex: 1;
            margin-right: 10px;
        }

        .file-badge {
            display: inline-block;
            padding: 4px 10px;
            background: linear-gradient(135deg, #FF6B6B, #FFA07A);
            color: white;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
        }

        .file-controls {
            margin-top: 10px;
            display: grid;
            gap: 8px;
        }

        .file-controls input[type="text"],
        .file-controls input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 13px;
        }

        .dimension-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 8px;
            align-items: center;
        }

        .lock-icon {
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .lock-icon:hover {
            transform: scale(1.2);
        }

        .file-status {
            margin-top: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending { color: #666; }
        .status-processing { color: #4ECDC4; }
        .status-complete { color: #10b981; }
        .status-error { color: #ef4444; }

        .controls {
            display: none;
            margin-top: 20px;
        }

        .controls.active {
            display: block;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 700;
            font-size: 14px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, #FF6B6B, #4ECDC4);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B6B, #FFA07A);
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(255, 107, 107, 0.5);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B6B, #FFA07A);
            cursor: pointer;
            border: none;
            box-shadow: 0 3px 10px rgba(255, 107, 107, 0.5);
        }

        .quality-value {
            font-weight: 700;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-width: 45px;
            text-align: right;
            font-size: 16px;
        }

        .compress-btn, .download-all-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FF6B6B, #FFA07A, #4ECDC4);
            background-size: 200% 200%;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            margin-top: 15px;
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
            animation: gradientShift 3s ease infinite;
        }

        .compress-btn:hover:not(:disabled), .download-all-btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.6);
        }

        .compress-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .download-all-btn {
            background: linear-gradient(135deg, #10b981, #34d399);
            animation: none;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #FF6B6B;
            border: 2px solid #FF6B6B;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .reset-btn:hover {
            background: #FF6B6B;
            color: white;
            transform: translateY(-2px);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            border: 3px solid #4ECDC4;
            font-size: 14px;
            font-weight: 600;
        }

        .notification.active {
            display: flex;
            animation: slideInRight 0.5s ease;
        }

        @keyframes slideInRight {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #FF6B6B;
            animation: confetti-fall 3s linear forwards;
        }

        .confetti:nth-child(2n) { background: #4ECDC4; }
        .confetti:nth-child(3n) { background: #FFA07A; }
        .confetti:nth-child(4n) { background: #45B7D1; }
        .confetti:nth-child(5n) { background: #F7DC6F; }

        .feature-badge {
            display: inline-block;
            padding: 6px 14px;
            background: linear-gradient(135deg, #4ECDC4, #45B7D1);
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(78, 205, 196, 0.3);
        }

        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 File Compressor</h1>
        <div style="text-align: center;"><span class="feature-badge">✨ Now supports multiple files! ✨</span></div>

        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Drop files here or click to browse</div>
            <div class="upload-subtext">Supports multiple images and PDFs</div>
        </div>

        <input type="file" id="fileInput" accept="image/*,.pdf" multiple>

        <div class="file-list" id="fileList"></div>

        <div class="controls" id="controls">
            <div class="control-group">
                <label>⚡ Quality (applies to all):</label>
                <div class="slider-container">
                    <input type="range" id="quality" min="10" max="100" value="85">
                    <span class="quality-value" id="qualityValue">85%</span>
                </div>
                <div class="help-text">Lower quality = smaller file size</div>
            </div>

            <button class="compress-btn" id="compressBtn">✨ Compress All Files ✨</button>
            <button class="download-all-btn" id="downloadAllBtn" style="display: none;">📥 Download All Files</button>
            <button class="reset-btn" id="resetBtn">🔄 Start Over</button>
        </div>
    </div>

    <div class="notification" id="notification">
        <span id="notificationText"></span>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const controls = document.getElementById('controls');
        const qualitySlider = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        const compressBtn = document.getElementById('compressBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const resetBtn = document.getElementById('resetBtn');
        const notification = document.getElementById('notification');

        let files = [];

        uploadZone.addEventListener('click', () => fileInput.click());
        
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(filesList) {
            files = Array.from(filesList).map((file, index) => {
                const fileType = file.type.startsWith('image/') ? 'image' : 'pdf';
                const nameWithoutExt = file.name.replace(/\.[^/.]+$/, '');
                
                return {
                    id: Date.now() + index,
                    file: file,
                    type: fileType,
                    filename: `compressed-${nameWithoutExt}`,
                    width: null,
                    height: null,
                    aspectRatio: 1,
                    lockAspect: true,
                    status: 'pending',
                    compressedBlob: null
                };
            });

            renderFileList();
            controls.classList.add('active');
            fileList.classList.add('active');

            // Load dimensions for each file
            files.forEach(loadFileDimensions);
        }

        async function loadFileDimensions(fileObj) {
            if (fileObj.type === 'image') {
                const img = new Image();
                img.onload = () => {
                    fileObj.width = img.width;
                    fileObj.height = img.height;
                    fileObj.aspectRatio = img.width / img.height;
                    updateFileItem(fileObj.id);
                };
                img.src = URL.createObjectURL(fileObj.file);
            } else {
                const formData = new FormData();
                formData.append('file', fileObj.file);
                
                try {
                    const response = await fetch('/get-pdf-dimensions', {
                        method: 'POST',
                        body: formData
                    });
                    const dimensions = await response.json();
                    fileObj.width = dimensions.width;
                    fileObj.height = dimensions.height;
                    fileObj.aspectRatio = dimensions.width / dimensions.height;
                    updateFileItem(fileObj.id);
                } catch (error) {
                    console.error('Dimensions error:', error);
                }
            }
        }

        function renderFileList() {
            fileList.innerHTML = files.map(fileObj => `
                <div class="file-item" data-id="${fileObj.id}">
                    <div class="file-header">
                        <span class="file-name">${fileObj.file.name}</span>
                        <span class="file-badge">${fileObj.type === 'image' ? '🖼️ Image' : '📄 PDF'}</span>
                    </div>
                    <div class="file-controls">
                        <input type="text" 
                               class="filename-input" 
                               value="${fileObj.filename}" 
                               placeholder="Filename"
                               data-id="${fileObj.id}">
                        <div class="dimension-row">
                            <input type="number" 
                                   class="width-input" 
                                   placeholder="Width" 
                                   value="${fileObj.width || ''}"
                                   data-id="${fileObj.id}">
                            <span class="lock-icon" data-id="${fileObj.id}">
                                ${fileObj.lockAspect ? '🔒' : '🔓'}
                            </span>
                            <input type="number" 
                                   class="height-input" 
                                   placeholder="Height" 
                                   value="${fileObj.height || ''}"
                                   data-id="${fileObj.id}">
                        </div>
                    </div>
                    <div class="file-status status-${fileObj.status}">
                        ${getStatusText(fileObj.status)}
                    </div>
                </div>
            `).join('');

            attachEventListeners();
        }

        function updateFileItem(id) {
            const fileObj = files.find(f => f.id === id);
            if (!fileObj) return;

            const item = document.querySelector(`[data-id="${id}"]`);
            if (!item) return;

            const widthInput = item.querySelector('.width-input');
            const heightInput = item.querySelector('.height-input');
            
            if (widthInput && !widthInput.value) widthInput.value = fileObj.width || '';
            if (heightInput && !heightInput.value) heightInput.value = fileObj.height || '';
        }

        function attachEventListeners() {
            // Filename inputs
            document.querySelectorAll('.filename-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const fileObj = files.find(f => f.id == e.target.dataset.id);
                    if (fileObj) fileObj.filename = e.target.value;
                });
            });

            // Width inputs
            document.querySelectorAll('.width-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const fileObj = files.find(f => f.id == e.target.dataset.id);
                    if (fileObj && fileObj.lockAspect && e.target.value) {
                        fileObj.width = parseInt(e.target.value);
                        fileObj.height = Math.round(fileObj.width / fileObj.aspectRatio);
                        const item = document.querySelector(`[data-id="${fileObj.id}"]`);
                        item.querySelector('.height-input').value = fileObj.height;
                    }
                });
            });

            // Height inputs
            document.querySelectorAll('.height-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const fileObj = files.find(f => f.id == e.target.dataset.id);
                    if (fileObj && fileObj.lockAspect && e.target.value) {
                        fileObj.height = parseInt(e.target.value);
                        fileObj.width = Math.round(fileObj.height * fileObj.aspectRatio);
                        const item = document.querySelector(`[data-id="${fileObj.id}"]`);
                        item.querySelector('.width-input').value = fileObj.width;
                    }
                });
            });

            // Lock icons
            document.querySelectorAll('.lock-icon').forEach(icon => {
                icon.addEventListener('click', (e) => {
                    const fileObj = files.find(f => f.id == e.target.dataset.id);
                    if (fileObj) {
                        fileObj.lockAspect = !fileObj.lockAspect;
                        e.target.textContent = fileObj.lockAspect ? '🔒' : '🔓';
                    }
                });
            });
        }

        function getStatusText(status) {
            const statusMap = {
                'pending': '⏳ Ready to compress',
                'processing': '⚙️ Compressing...',
                'complete': '✅ Complete',
                'error': '❌ Failed'
            };
            return statusMap[status] || status;
        }

        qualitySlider.addEventListener('input', (e) => {
            qualityValue.textContent = e.target.value + '%';
        });

        compressBtn.addEventListener('click', async () => {
            compressBtn.disabled = true;
            
            for (const fileObj of files) {
                fileObj.status = 'processing';
                renderFileList();

                try {
                    const formData = new FormData();
                    formData.append('file', fileObj.file);
                    formData.append('quality', qualitySlider.value);
                    
                    const item = document.querySelector(`[data-id="${fileObj.id}"]`);
                    const width = item.querySelector('.width-input').value;
                    const height = item.querySelector('.height-input').value;
                    
                    if (width) formData.append('width', width);
                    if (height) formData.append('height', height);

                    let endpoint = fileObj.type === 'image' ? '/compress-image' : '/compress-pdf';
                    
                    if (fileObj.type === 'image') {
                        formData.append('format', 'JPEG');
                    }

                    const response = await fetch(endpoint, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) throw new Error('Compression failed');

                    fileObj.compressedBlob = await response.blob();
                    fileObj.status = 'complete';
                    
                } catch (error) {
                    console.error('Error compressing file:', error);
                    fileObj.status = 'error';
                }

                renderFileList();
            }

            compressBtn.disabled = false;
            
            const allComplete = files.every(f => f.status === 'complete');
            if (allComplete) {
                downloadAllBtn.style.display = 'block';
                showNotification('✅ All files compressed!');
                createConfetti();
            }
        });

        downloadAllBtn.addEventListener('click', () => {
            files.forEach(fileObj => {
                if (fileObj.compressedBlob) {
                    const extension = fileObj.type === 'image' ? 'jpg' : 'pdf';
                    const filename = `${fileObj.filename}.${extension}`;
                    
                    const url = URL.createObjectURL(fileObj.compressedBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }
            });
            
            showNotification('📥 Downloading all files!');
        });

        resetBtn.addEventListener('click', () => {
            files = [];
            fileInput.value = '';
            fileList.classList.remove('active');
            controls.classList.remove('active');
            downloadAllBtn.style.display = 'none';
            renderFileList();
        });

        function showNotification(message) {
            document.getElementById('notificationText').textContent = message;
            notification.classList.add('active');
            setTimeout(() => {
                notification.classList.remove('active');
            }, 3000);
        }

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.animationDelay = Math.random() * 3 + 's';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 5000);
                }, i * 30);
            }
        }
    </script>
</body>
</html>
