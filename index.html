<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Compressor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .upload-zone {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            border: 3px dashed #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .upload-zone:hover {
            border-color: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .upload-zone.dragover {
            background: #f0f4ff;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 10px;
        }

        .upload-subtext {
            color: #999;
            font-size: 0.9em;
        }

        .controls {
            display: none;
            margin-top: 30px;
        }

        .controls.active {
            display: block;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .file-type-badge {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .control-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .slider-container {
            margin-bottom: 25px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .slider-value {
            color: #667eea;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            border: none;
        }

        .dimension-controls {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 15px;
            align-items: end;
        }

        .lock-button {
            padding: 12px 20px;
            background: #f0f0f0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.5em;
            transition: all 0.3s;
            margin-bottom: 0;
        }

        .lock-button.locked {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .comparison {
            display: none;
            margin-top: 30px;
        }

        .comparison.active {
            display: block;
        }

        .comparison-title {
            color: white;
            font-size: 1.8em;
            margin-bottom: 20px;
            text-align: center;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .preview-box {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .preview-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .preview-image {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .preview-info {
            color: #666;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .savings {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .savings-amount {
            font-size: 2em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .savings.negative {
            background: #fff3cd;
            border: 2px solid #ffc107;
        }

        .savings.negative .savings-amount {
            background: linear-gradient(135deg, #ff6b6b 0%, #c92a2a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .download-box {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .drag-hint {
            color: #667eea;
            font-size: 1.2em;
            margin-bottom: 20px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 10px;
            border: 2px dashed #667eea;
        }

        .compressed-preview {
            cursor: move;
            transition: transform 0.2s;
        }

        .compressed-preview:hover {
            transform: scale(1.02);
        }

        .spinner {
            display: none;
            margin: 20px auto;
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .spinner.active {
            display: block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .notification.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .help-text {
            color: #999;
            font-size: 0.85em;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .comparison-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 PDF Compressor</h1>

        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Drop your PDF here</div>
            <div class="upload-subtext">or click to browse</div>
            <input type="file" id="fileInput" accept="application/pdf" style="display: none;">
        </div>

        <div class="controls" id="controls">
            <div class="file-type-badge">📄 PDF</div>
            
            <div class="control-group">
                <label for="filename">Filename:</label>
                <input type="text" id="filename" placeholder="compressed-file">
            </div>

            <div class="slider-container">
                <div class="slider-label">
                    <label>PDF Quality:</label>
                    <span class="slider-value" id="qualityValue">54%</span>
                </div>
                <input type="range" id="quality" min="10" max="100" value="54">
                <div class="help-text">Lower quality = smaller file. PDF pages are re-rendered and compressed.</div>
            </div>

            <div class="control-group">
                <label>Dimensions:</label>
                <div class="dimension-controls">
                    <div>
                        <input type="number" id="width" placeholder="Width">
                    </div>
                    <button class="lock-button locked" id="lockAspect">🔒</button>
                    <div>
                        <input type="number" id="height" placeholder="Height">
                    </div>
                </div>
                <div class="help-text">Lock aspect ratio to maintain proportions</div>
            </div>

            <button id="compressBtn">Compress PDF</button>
        </div>

        <div class="spinner" id="spinner"></div>

        <div class="comparison" id="comparison">
            <h2 class="comparison-title">Results</h2>
            
            <div class="comparison-grid">
                <div class="preview-box">
                    <div class="preview-title">Original</div>
                    <img class="preview-image" id="originalPreview" alt="Original">
                    <div class="preview-info">
                        <strong>Size:</strong> <span id="originalSize"></span><br>
                        <strong>Dimensions:</strong> <span id="originalDimensions"></span>
                    </div>
                </div>

                <div class="preview-box">
                    <div class="drag-hint">👆 Drag this to your desktop to save!</div>
                    <div class="preview-title">Compressed</div>
                    <img class="preview-image compressed-preview" id="compressedPreview" alt="Compressed" draggable="true">
                    <div class="preview-info">
                        <strong>Size:</strong> <span id="compressedSize"></span><br>
                        <strong>Dimensions:</strong> <span id="compressedDimensions"></span>
                    </div>
                </div>
            </div>

            <div class="savings" id="savings">
                <div class="savings-amount" id="savingsAmount"></div>
            </div>

            <div class="download-box">
                <button id="downloadBtn">Download Compressed PDF</button>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const filenameInput = document.getElementById('filename');
        const qualitySlider = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');
        const lockAspect = document.getElementById('lockAspect');
        const compressBtn = document.getElementById('compressBtn');
        const spinner = document.getElementById('spinner');
        const comparison = document.getElementById('comparison');
        const notification = document.getElementById('notification');

        let originalFile = null;
        let compressedBlob = null;
        let originalAspectRatio = 1;
        let aspectRatioLocked = true;
        let originalPreviewUrl = null;

        uploadZone.addEventListener('click', () => fileInput.click());
        
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                handleFile(file);
            } else {
                showNotification('⚠️ Please upload a PDF file');
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        async function handleFile(file) {
            originalFile = file;

            const nameWithoutExt = file.name.replace(/\.[^/.]+$/, '');
            filenameInput.value = `compressed-${nameWithoutExt}`;

            const formData = new FormData();
            formData.append('file', file);
            
            try {
                // Get preview
                const previewResponse = await fetch('/pdf-preview', {
                    method: 'POST',
                    body: formData
                });
                const blob = await previewResponse.blob();
                originalPreviewUrl = URL.createObjectURL(blob);

                // Get dimensions
                const dimensionsFormData = new FormData();
                dimensionsFormData.append('file', file);
                const dimensionsResponse = await fetch('/get-pdf-dimensions', {
                    method: 'POST',
                    body: dimensionsFormData
                });
                const dimensions = await dimensionsResponse.json();
                widthInput.value = dimensions.width;
                heightInput.value = dimensions.height;
                originalAspectRatio = dimensions.width / dimensions.height;
            } catch (error) {
                console.error('Preview error:', error);
                showNotification('⚠️ Error loading PDF preview');
            }

            controls.classList.add('active');
            comparison.classList.remove('active');
        }

        qualitySlider.addEventListener('input', (e) => {
            qualityValue.textContent = e.target.value + '%';
        });

        lockAspect.addEventListener('click', () => {
            aspectRatioLocked = !aspectRatioLocked;
            lockAspect.textContent = aspectRatioLocked ? '🔒' : '🔓';
            lockAspect.classList.toggle('locked');
        });

        widthInput.addEventListener('input', () => {
            if (aspectRatioLocked && widthInput.value) {
                heightInput.value = Math.round(widthInput.value / originalAspectRatio);
            }
        });

        heightInput.addEventListener('input', () => {
            if (aspectRatioLocked && heightInput.value) {
                widthInput.value = Math.round(heightInput.value * originalAspectRatio);
            }
        });

        compressBtn.addEventListener('click', async () => {
            if (!originalFile) return;

            spinner.classList.add('active');
            compressBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('file', originalFile);
                formData.append('quality', qualitySlider.value);
                formData.append('width', widthInput.value);
                formData.append('height', heightInput.value);

                const response = await fetch('/compress-pdf', {
                    method: 'POST',
                    body: formData
                });

                compressedBlob = await response.blob();

                // Show comparison
                document.getElementById('originalPreview').src = originalPreviewUrl;
                document.getElementById('originalSize').textContent = formatFileSize(originalFile.size);
                document.getElementById('originalDimensions').textContent = 'PDF Document';

                // Get preview of compressed PDF
                const previewFormData = new FormData();
                previewFormData.append('file', compressedBlob, 'compressed.pdf');
                const previewResponse = await fetch('/pdf-preview', {
                    method: 'POST',
                    body: previewFormData
                });
                const previewBlob = await previewResponse.blob();
                document.getElementById('compressedPreview').src = URL.createObjectURL(previewBlob);

                document.getElementById('compressedSize').textContent = formatFileSize(compressedBlob.size);
                document.getElementById('compressedDimensions').textContent = `PDF Document (Compressed)`;

                const savings = ((originalFile.size - compressedBlob.size) / originalFile.size * 100);
                const savingsElement = document.getElementById('savings');
                const savingsAmount = document.getElementById('savingsAmount');
                
                if (savings > 0) {
                    savingsElement.classList.remove('negative');
                    savingsAmount.textContent = `✅ File reduced by ${savings.toFixed(1)}%`;
                } else {
                    savingsElement.classList.add('negative');
                    savingsAmount.textContent = `⚠️ File increased by ${Math.abs(savings).toFixed(1)}%`;
                }

                comparison.classList.add('active');
                showNotification('✅ Compression complete!');

            } catch (error) {
                console.error('Compression error:', error);
                showNotification('❌ Compression failed. Please try again.');
            } finally {
                spinner.classList.remove('active');
                compressBtn.disabled = false;
            }
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (!compressedBlob) return;

            const filename = filenameInput.value || 'compressed-file';
            
            const url = URL.createObjectURL(compressedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename + '.pdf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showNotification('📥 Download started!');
        });

        document.getElementById('compressedPreview').addEventListener('dragstart', (e) => {
            if (!compressedBlob) return;

            const filename = filenameInput.value || 'compressed-file';
            
            e.dataTransfer.setData('DownloadURL', 
                `application/pdf:${filename}.pdf:${URL.createObjectURL(compressedBlob)}`);
        });

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function showNotification(message) {
            notification.textContent = message;
            notification.classList.add('active');
            setTimeout(() => {
                notification.classList.remove('active');
            }, 3000);
        }
    </script>
</body>
</html>
