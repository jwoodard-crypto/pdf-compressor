<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Compressor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(-45deg, #FF6B6B, #4ECDC4, #45B7D1, #FFA07A, #98D8C8, #F7DC6F);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            padding: 50px;
            max-width: 650px;
            width: 100%;
            position: relative;
            z-index: 1;
            animation: float 6s ease-in-out infinite;
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #45B7D1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            font-size: 36px;
            font-weight: 800;
            animation: rainbow 5s linear infinite;
        }

        .upload-zone {
            border: 4px dashed #FF6B6B;
            border-radius: 20px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            background: linear-gradient(135deg, #FFF5F5, #F0FFFF);
            position: relative;
            overflow: hidden;
        }

        .upload-zone::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,107,107,0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.6s;
        }

        .upload-zone:hover::before {
            left: 100%;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: #4ECDC4;
            background: linear-gradient(135deg, #F0FFFF, #FFF5F5);
            transform: scale(1.03) rotate(1deg);
            box-shadow: 0 10px 40px rgba(78, 205, 196, 0.3);
        }

        .upload-icon {
            font-size: 70px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        .upload-text {
            font-size: 20px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .upload-subtext {
            font-size: 14px;
            color: #666;
        }

        #fileInput {
            display: none;
        }

        .controls {
            display: none;
            margin-top: 30px;
        }

        .controls.active {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-badge {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #FF6B6B, #FFA07A);
            color: white;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        .control-group {
            margin-bottom: 25px;
        }

        .control-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 700;
            font-size: 15px;
        }

        .help-text {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
            font-style: italic;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 14px;
            border: 3px solid #E0E0E0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: white;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #4ECDC4;
            box-shadow: 0 0 0 4px rgba(78, 205, 196, 0.2);
            transform: translateY(-2px);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(to right, #FF6B6B, #4ECDC4);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B6B, #FFA07A);
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.5);
            transition: all 0.3s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.7);
        }

        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B6B, #FFA07A);
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.5);
        }

        .quality-value {
            font-weight: 700;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-width: 50px;
            text-align: right;
            font-size: 18px;
        }

        .dimension-inputs {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 15px;
            align-items: center;
        }

        .lock-aspect {
            cursor: pointer;
            font-size: 28px;
            user-select: none;
            transition: all 0.3s;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .lock-aspect:hover {
            transform: scale(1.2) rotate(10deg);
        }

        .format-select {
            display: none;
        }

        .format-select.active {
            display: block;
        }

        .compress-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #FF6B6B, #FFA07A, #4ECDC4);
            background-size: 200% 200%;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            margin-top: 25px;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
            animation: gradientShift 3s ease infinite;
        }

        .compress-btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 35px rgba(255, 107, 107, 0.6);
        }

        .compress-btn:active:not(:disabled) {
            transform: translateY(-1px) scale(0.98);
        }

        .compress-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            text-align: center;
            margin-top: 25px;
        }

        .spinner.active {
            display: block;
        }

        .spinner-icon {
            font-size: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spinner p {
            margin-top: 15px;
            font-weight: 600;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .results {
            display: none;
            margin-top: 30px;
            text-align: center;
        }

        .results.active {
            display: block;
            animation: slideIn 0.5s ease;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 1s ease-in-out 3;
        }

        .results h2 {
            background: linear-gradient(135deg, #4ECDC4, #45B7D1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .stats {
            background: linear-gradient(135deg, #FFF5F5, #F0FFFF);
            border-radius: 15px;
            padding: 25px;
            margin: 25px 0;
            border: 3px solid #E0E0E0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: #666;
            font-weight: 600;
        }

        .stat-value {
            font-weight: 700;
            color: #333;
        }

        .savings {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 3px solid #E0E0E0;
        }

        .savings.positive .stat-value {
            color: #10b981;
            font-size: 18px;
        }

        .savings.negative .stat-value {
            color: #ef4444;
            font-size: 18px;
        }

        .download-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #10b981, #34d399);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            margin-top: 25px;
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        .download-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 35px rgba(16, 185, 129, 0.6);
        }

        .reset-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #FF6B6B;
            border: 3px solid #FF6B6B;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
        }

        .reset-btn:hover {
            background: #FF6B6B;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 18px 28px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            animation: slideInRight 0.5s ease;
            border: 3px solid #4ECDC4;
        }

        .notification.active {
            display: flex;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .error-details {
            background: #fee;
            border: 3px solid #fcc;
            border-radius: 12px;
            padding: 18px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            color: #c00;
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #FF6B6B;
            position: absolute;
            animation: confetti-fall 3s linear forwards;
        }

        .confetti:nth-child(2n) { background: #4ECDC4; }
        .confetti:nth-child(3n) { background: #FFA07A; }
        .confetti:nth-child(4n) { background: #45B7D1; }
        .confetti:nth-child(5n) { background: #F7DC6F; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 File Compressor</h1>

        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Drop your file here or click to browse</div>
            <div class="upload-subtext">Supports images (PNG, JPEG, WebP) and PDFs</div>
        </div>

        <input type="file" id="fileInput" accept="image/*,.pdf">

        <div class="controls" id="controls">
            <span class="file-badge" id="fileTypeBadge">📄 File</span>

            <div class="control-group">
                <label for="filename">✏️ Filename:</label>
                <input type="text" id="filename" placeholder="compressed-file">
            </div>

            <div class="control-group format-select" id="formatSelect">
                <label for="format">🎨 Output Format:</label>
                <select id="format">
                    <option value="JPEG">JPEG</option>
                    <option value="WEBP">WebP</option>
                    <option value="PNG">PNG</option>
                </select>
            </div>

            <div class="control-group">
                <label id="qualityLabel">⚡ Quality:</label>
                <div class="slider-container">
                    <input type="range" id="quality" min="10" max="100" value="85">
                    <span class="quality-value" id="qualityValue">85%</span>
                </div>
                <div class="help-text" id="qualityHelp">Lower quality = smaller file size</div>
            </div>

            <div class="control-group">
                <label>📏 Dimensions:</label>
                <div class="dimension-inputs">
                    <input type="number" id="width" placeholder="Width">
                    <span class="lock-aspect" id="lockAspect">🔒</span>
                    <input type="number" id="height" placeholder="Height">
                </div>
                <div class="help-text">Leave empty to keep original size</div>
            </div>

            <button class="compress-btn" id="compressBtn">✨ Compress File ✨</button>
        </div>

        <div class="spinner" id="spinner">
            <div class="spinner-icon">⚙️</div>
            <p>Compressing your file...</p>
        </div>

        <div class="results" id="results">
            <div class="success-icon">🎉</div>
            <h2>Compression Complete!</h2>

            <div class="stats">
                <div class="stat-row">
                    <span class="stat-label">📦 Original Size:</span>
                    <span class="stat-value" id="originalSize">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">✨ Compressed Size:</span>
                    <span class="stat-value" id="compressedSize">-</span>
                </div>
                <div class="stat-row savings" id="savings">
                    <span class="stat-label"></span>
                    <span class="stat-value" id="savingsText">-</span>
                </div>
            </div>

            <button class="download-btn" id="downloadBtn">📥 Download Compressed File</button>
            <button class="reset-btn" id="resetBtn">🔄 Compress Another File</button>
        </div>

        <div id="errorDisplay"></div>
    </div>

    <div class="notification" id="notification">
        <span id="notificationText"></span>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const controls = document.getElementById('controls');
        const fileTypeBadge = document.getElementById('fileTypeBadge');
        const formatSelect = document.getElementById('formatSelect');
        const filenameInput = document.getElementById('filename');
        const formatSelector = document.getElementById('format');
        const qualitySlider = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        const qualityLabel = document.getElementById('qualityLabel');
        const qualityHelp = document.getElementById('qualityHelp');
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');
        const lockAspect = document.getElementById('lockAspect');
        const compressBtn = document.getElementById('compressBtn');
        const spinner = document.getElementById('spinner');
        const results = document.getElementById('results');
        const notification = document.getElementById('notification');
        const errorDisplay = document.getElementById('errorDisplay');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');

        let originalFile = null;
        let compressedBlob = null;
        let originalAspectRatio = 1;
        let aspectRatioLocked = true;
        let fileType = null;

        uploadZone.addEventListener('click', () => fileInput.click());
        
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        async function handleFile(file) {
            originalFile = file;
            fileType = file.type.startsWith('image/') ? 'image' : 'pdf';

            const nameWithoutExt = file.name.replace(/\.[^/.]+$/, '');
            filenameInput.value = `compressed-${nameWithoutExt}`;

            if (fileType === 'image') {
                fileTypeBadge.textContent = '🖼️ Image';
                formatSelect.classList.add('active');
                qualityLabel.textContent = '⚡ Image Quality:';
                qualityHelp.textContent = 'Lower quality = smaller file size';
                
                const img = new Image();
                img.onload = () => {
                    widthInput.value = img.width;
                    heightInput.value = img.height;
                    originalAspectRatio = img.width / img.height;
                };
                img.src = URL.createObjectURL(file);
            } else {
                fileTypeBadge.textContent = '📄 PDF';
                formatSelect.classList.remove('active');
                qualityLabel.textContent = '⚡ PDF Quality:';
                qualityHelp.textContent = 'Lower quality = smaller file. PDF pages are re-rendered and compressed.';
                
                const formData = new FormData();
                formData.append('file', file);
                
                try {
                    const response = await fetch('/get-pdf-dimensions', {
                        method: 'POST',
                        body: formData
                    });
                    const dimensions = await response.json();
                    widthInput.value = dimensions.width;
                    heightInput.value = dimensions.height;
                    originalAspectRatio = dimensions.width / dimensions.height;
                } catch (error) {
                    console.error('Dimensions error:', error);
                    showError('Failed to get PDF dimensions', error);
                }
            }

            controls.classList.add('active');
            results.classList.remove('active');
            errorDisplay.innerHTML = '';
        }

        qualitySlider.addEventListener('input', (e) => {
            qualityValue.textContent = e.target.value + '%';
        });

        widthInput.addEventListener('input', (e) => {
            if (aspectRatioLocked && e.target.value) {
                heightInput.value = Math.round(e.target.value / originalAspectRatio);
            }
        });

        heightInput.addEventListener('input', (e) => {
            if (aspectRatioLocked && e.target.value) {
                widthInput.value = Math.round(e.target.value * originalAspectRatio);
            }
        });

        lockAspect.addEventListener('click', () => {
            aspectRatioLocked = !aspectRatioLocked;
            lockAspect.textContent = aspectRatioLocked ? '🔒' : '🔓';
        });

        compressBtn.addEventListener('click', async () => {
            if (!originalFile) return;

            spinner.classList.add('active');
            compressBtn.disabled = true;
            controls.style.opacity = '0.5';
            errorDisplay.innerHTML = '';

            try {
                const formData = new FormData();
                formData.append('file', originalFile);
                formData.append('quality', qualitySlider.value);
                formData.append('width', widthInput.value);
                formData.append('height', heightInput.value);

                let endpoint = fileType === 'image' ? '/compress-image' : '/compress-pdf';
                
                if (fileType === 'image') {
                    formData.append('format', formatSelector.value);
                }

                console.log('Sending request to:', endpoint);
                console.log('Quality:', qualitySlider.value);
                console.log('Dimensions:', widthInput.value, 'x', heightInput.value);

                const response = await fetch(endpoint, {
                    method: 'POST',
                    body: formData
                });

                console.log('Response status:', response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Server error response:', errorText);
                    throw new Error(`Server returned ${response.status}: ${errorText}`);
                }

                compressedBlob = await response.blob();
                console.log('Received blob:', compressedBlob.size, 'bytes');

                document.getElementById('originalSize').textContent = formatFileSize(originalFile.size);
                document.getElementById('compressedSize').textContent = formatFileSize(compressedBlob.size);

                const savings = ((originalFile.size - compressedBlob.size) / originalFile.size * 100);
                const savingsElement = document.getElementById('savings');
                const savingsText = document.getElementById('savingsText');
                
                if (savings > 0) {
                    savingsElement.classList.remove('negative');
                    savingsElement.classList.add('positive');
                    savingsText.textContent = `✅ File reduced by ${savings.toFixed(1)}%`;
                } else {
                    savingsElement.classList.remove('positive');
                    savingsElement.classList.add('negative');
                    savingsText.textContent = `⚠️ File increased by ${Math.abs(savings).toFixed(1)}%`;
                }

                controls.classList.remove('active');
                results.classList.add('active');
                showNotification('✅ Compression complete!');
                createConfetti();

            } catch (error) {
                console.error('Compression error:', error);
                showError('Compression failed', error);
                showNotification('❌ Compression failed. Check error details below.');
            } finally {
                spinner.classList.remove('active');
                compressBtn.disabled = false;
                controls.style.opacity = '1';
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (!compressedBlob) return;

            const extension = fileType === 'image' ? formatSelector.value.toLowerCase() : 'pdf';
            const filename = `${filenameInput.value}.${extension}`;

            const url = URL.createObjectURL(compressedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showNotification('📥 Download started!');
        });

        resetBtn.addEventListener('click', () => {
            originalFile = null;
            compressedBlob = null;
            fileInput.value = '';
            controls.classList.remove('active');
            results.classList.remove('active');
            errorDisplay.innerHTML = '';
        });

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

        function showNotification(message) {
            const notificationText = document.getElementById('notificationText');
            notificationText.textContent = message;
            notification.classList.add('active');
            setTimeout(() => {
                notification.classList.remove('active');
            }, 3000);
        }

        function showError(message, error) {
            errorDisplay.innerHTML = `
                <div class="error-details">
                    <strong>❌ ${message}</strong><br><br>
                    <strong>Error:</strong> ${error.message}<br>
                    <strong>Stack:</strong><br>
                    <pre>${error.stack || 'No stack trace available'}</pre>
                </div>
            `;
        }

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.animationDelay = Math.random() * 3 + 's';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 5000);
                }, i * 30);
            }
        }
    </script>
</body>
</html>
